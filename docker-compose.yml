version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:5.0
    expose:
      - 6379

  django_app:
    build:
      context: .
    env_file: .env
    environment:
      - ENV_MODE=development
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    volumes:
      - django_static_files:/app/staticfiles
      - ./webfiles/media:/app/webfiles/media
    command: python manage.py runserver 0.0.0.0:8000
    expose:
      - 8000

  web_server:
    image: nginx
    depends_on:
      - django_app
    volumes:
      - django_static_files:/usr/share/nginx/html/static
      - ./webfiles/media:/usr/share/nginx/html/media
      - ./nginx-server/config.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

volumes:
  django_static_files:
  mysql_data: