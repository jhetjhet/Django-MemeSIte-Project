services:
  django_app:
    image: snits/django-memesite:${DJANGO_APP_VERSION:-latest}
    build: !reset null
    ports: []
    environment:
      - ENV_MODE=production
    command: daphne -b 0.0.0.0 -p 8000 Memeniac.asgi:application
  
  web_server:
    image: nginx
    depends_on:
      - django_app
    volumes:
      - ./staticfiles:/usr/share/nginx/html/static
      - ./webfiles/media:/usr/share/nginx/html/media
      - ./nginx-server/config.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8001:80"