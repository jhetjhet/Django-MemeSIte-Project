version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: rootpassowrd
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:5.0
    expose:
      - 6379
  
  django_app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    environment:
      - ENV_MODE=production
      - WEBSOCKET_URL=ws://localhost
    volumes:
      - django_static_files:/app/staticfiles
      - ./webfiles/media:/app/webfiles/media
    expose:
      - 8000
    depends_on:
      - mysql

  django_websocket:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    environment:
      - ENV_MODE=daphne
      - MAKE_MIGRATION=False
      - MIGRATE=False
      - COLLECTSTATIC=False
    depends_on:
      - django_app # migrations and main database is from this app
    expose:
      - 8001

  web_server:
    image: nginx
    depends_on:
      - django_app
      - django_websocket
    volumes:
      - django_static_files:/usr/share/nginx/html/static
      - ./webfiles/media:/usr/share/nginx/html/media
      - ./nginx-server/config.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 80:80

volumes:
  django_static_files:
  mysql_data: